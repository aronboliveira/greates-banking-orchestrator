# ════════════════════════════════════════════════════════════════════════════
# The Greatest Banking Orchestrator API — DynamoDB Profile (alternative to RDS)
# Activated by: SPRING_PROFILES_ACTIVE=eks,eks-dynamo
# This profile DISABLES JPA / Flyway / DataSource auto-configuration.
# Persistence is performed exclusively via DynamoDbEnhancedClient.
# ════════════════════════════════════════════════════════════════════════════

# ── Disable JPA / DataSource / Flyway auto-configuration ──
# Using profile-specific exclusions so the eks profile (RDS path) is unaffected.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

# ── DynamoDB ──
aws.dynamodb.table-name=${DYNAMODB_TABLE_NAME:gbo-api}
aws.dynamodb.read-timeout-ms=5000
aws.dynamodb.connect-timeout-ms=2000

# ── Flyway disabled (no SQL DB) ──
spring.flyway.enabled=false

# ── No SQL logging in DynamoDB profile ──
spring.jpa.show-sql=false

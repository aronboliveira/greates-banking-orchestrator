# ════════════════════════════════════════════════════════════════════════════
# Pismo Challenge API — EKS / RDS Profile
# Activated by: SPRING_PROFILES_ACTIVE=eks
# ────────────────────────────────────────────────────────────────────────────
# Note on secrets:
#   This file MUST NOT contain plaintext secrets. All sensitive values resolve
#   from environment variables that are populated in the pod by the External
#   Secrets Operator from AWS Secrets Manager. See k8s/03-external-secret.yaml.
# ════════════════════════════════════════════════════════════════════════════

# ── Database (RDS Aurora PostgreSQL via RDS Proxy) ──
# SPRING_DATASOURCE_URL is provided by the ExternalSecret (synced from
# Secrets Manager: pismo/rds/app-config). It must include sslmode=verify-full.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP connection pool tuning for RDS Proxy + EKS ──
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.pool-name=pismo-hikari-pool
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000

# ── JPA / Hibernate (production: schema is managed by Flyway, not Hibernate) ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Flyway ──
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# ── Actuator (k8s probes + Prometheus scrape) ──
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.base-path=/actuator
management.metrics.tags.application=pismo-challenge-api

# ── Logging (production) ──
logging.level.root=INFO
logging.level.com.pismochallenge=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} [%thread] %-5level %logger{36} - %msg%n

# ── Server ──
# Tomcat work dir under /tmp because container has read-only root filesystem
server.tomcat.basedir=/tmp/tomcat
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── AWS Region (resolved by AWS SDK DefaultCredentialsProvider chain) ──
aws.region=${AWS_REGION:us-east-1}

# ── KMS field-level encryption (PII: document_number) ──
# Replace with: arn:aws:kms:<region>:<account-id>:alias/pismo-field-encryption-key
# Provided to the pod via ConfigMap (k8s/04-configmap.yaml)
aws.kms.field-key-arn=${AWS_KMS_FIELD_KEY_ARN}

# ── S3 Audit Log Bucket ──
aws.s3.audit-bucket=${AUDIT_S3_BUCKET}
aws.s3.audit-prefix=${AUDIT_S3_PREFIX:transactions/}

# ── SQS ──
aws.sqs.transaction-events-queue-url=${SQS_TRANSACTION_EVENTS_URL}
aws.sqs.account-events-queue-url=${SQS_ACCOUNT_EVENTS_URL:}

# ── Spring Security / OAuth2 Resource Server ──
# JWKS URI from your IdP (Cognito/Auth0/Okta) — provided via ConfigMap
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWKS_URI}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI}

# ── Outbox publisher schedule ──
pismo.outbox.fixed-delay-ms=1000
pismo.outbox.batch-size=50

# ── Disable Spring Boot Docker Compose support in EKS ──
spring.docker.compose.enabled=false

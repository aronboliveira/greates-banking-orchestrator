spring.application.name=greatest-banking-orchestrator-api

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway is disabled in the default profile so the existing Docker Compose
# workflow keeps Hibernate auto-DDL (developer convenience). Flyway is enabled
# only in application-eks.properties (production schema management).
spring.flyway.enabled=false

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/greatest_banking_orchestrator}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gbo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gbo}

# Portfolio auth/demo settings
app.jwt.secret=${APP_JWT_SECRET:local-demo-secret-change-before-deploying-the-greatest-banking-orchestrator}
app.jwt.issuer=${APP_JWT_ISSUER:the-greatest-banking-orchestrator}
app.jwt.ttl-minutes=${APP_JWT_TTL_MINUTES:240}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# SMTP notification wiring. Disabled by default; Render/production can enable it
# by providing SMTP credentials. Demo mode only sends real email to the
# configured allowed recipient and logs all other notification attempts.
app.notifications.smtp-enabled=${APP_NOTIFICATIONS_SMTP_ENABLED:false}
app.notifications.allowed-recipient=${APP_NOTIFICATIONS_ALLOWED_RECIPIENT:aronprogamador@gmail.com}
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8

# Actuator
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,metrics,threaddump,info,caches

# Jackson — snake_case serialization to follow API contract
spring.jackson.property-naming-strategy=SNAKE_CASE

# Docker Compose — disabled; orchestration is done manually
spring.docker.compose.enabled=false

# Resilience4j — Retry (exponential backoff)
resilience.retry.max-attempts=3
resilience.retry.initial-interval-ms=200
resilience.retry.multiplier=2.0

# Resilience4j — Circuit Breaker
resilience.circuit-breaker.failure-rate-threshold=50
resilience.circuit-breaker.wait-duration-open-s=30
resilience.circuit-breaker.sliding-window-size=10
resilience.circuit-breaker.minimum-calls=5
resilience.circuit-breaker.permitted-half-open-calls=3

# Resilience4j — Rate Limiter
resilience.rate-limiter.limit-per-period=100
resilience.rate-limiter.period-ms=1000
resilience.rate-limiter.timeout-ms=500

spring.datasource.url=jdbc:h2:mem:gbo_local;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.flyway.enabled=false
spring.docker.compose.enabled=false

app.jwt.secret=local-profile-secret-change-before-sharing-the-greatest-banking-orchestrator
app.jwt.issuer=the-greatest-banking-orchestrator-local
app.jwt.ttl-minutes=240
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174

app.notifications.smtp-enabled=false
app.notifications.allowed-recipient=aronprogamador@gmail.com
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

logging.level.root=INFO
logging.level.com.greatestbanking.orchestrator.api=INFO

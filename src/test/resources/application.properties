spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.docker.compose.enabled=false
app.jwt.secret=test-secret-that-is-long-enough-for-hmac-signing
app.jwt.issuer=the-greatest-banking-orchestrator-test
app.jwt.ttl-minutes=60
app.cors.allowed-origins=http://localhost:5173
app.notifications.smtp-enabled=false
app.notifications.allowed-recipient=aronprogamador@gmail.com
logging.level.root=WARN
logging.level.com.greatestbanking.orchestrator.api=INFO
spring.main.banner-mode=off

# Resilience4j — relaxed for tests
resilience.retry.max-attempts=3
resilience.retry.initial-interval-ms=50
resilience.retry.multiplier=1.5
resilience.circuit-breaker.failure-rate-threshold=50
resilience.circuit-breaker.wait-duration-open-s=2
resilience.circuit-breaker.sliding-window-size=5
resilience.circuit-breaker.minimum-calls=3
resilience.circuit-breaker.permitted-half-open-calls=2
resilience.rate-limiter.limit-per-period=10
resilience.rate-limiter.period-ms=1000
resilience.rate-limiter.timeout-ms=0

name: greatest-banking-orchestrator

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: greatest_banking_orchestrator
      POSTGRES_USER: gbo
      POSTGRES_PASSWORD: gbo
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gbo -d greatest_banking_orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/greatest_banking_orchestrator
      SPRING_DATASOURCE_USERNAME: gbo
      SPRING_DATASOURCE_PASSWORD: gbo
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      APP_JWT_SECRET: local-compose-secret-change-before-deploying-gbo
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
      APP_NOTIFICATIONS_SMTP_ENABLED: "false"
      APP_NOTIFICATIONS_ALLOWED_RECIPIENT: aronprogamador@gmail.com
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:

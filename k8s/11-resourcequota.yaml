apiVersion: v1
kind: ResourceQuota
metadata:
  name: gbo-api-quota
  namespace: gbo-api
spec:
  hard:
    requests.cpu:    "4"
    requests.memory: "4Gi"
    limits.cpu:      "20"
    limits.memory:   "10Gi"
    pods:            "20"
    services:        "5"
    secrets:         "20"
    configmaps:      "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: gbo-api-limits
  namespace: gbo-api
spec:
  limits:
    - type: Container
      default:
        cpu:    "2000m"
        memory: "1Gi"
      defaultRequest:
        cpu:    "500m"
        memory: "512Mi"
      max:
        cpu:    "4000m"
        memory: "2Gi"
      min:
        cpu:    "100m"
        memory: "128Mi"

# Requires External Secrets Operator (ESO) installed in the external-secrets
# namespace. See handoff.md §9.5 for the install command.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gbo-aws-secrets
spec:
  provider:
    aws:
      service: SecretsManager
      # OPERATOR ACTION: replace REGION with your AWS region (e.g. us-east-1).
      region: REGION
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets

# Pulls DB connection details from AWS Secrets Manager and projects them as
# the Kubernetes Secret 'gbo-db-secret', which the Deployment loads via
# envFrom. The application reads them as standard env vars — no AWS SDK calls
# are needed at startup.
#
# OPERATOR ACTION (handoff.md §7.4):
#   Create the Secrets Manager secret 'gbo/rds/app-config' with this JSON:
#     {
#       "host":       "<rds-proxy-or-aurora-reader-endpoint>",
#       "write_host": "<aurora-cluster-writer-endpoint>",
#       "port":       "5432",
#       "dbname":     "greatest_banking_orchestrator",
#       "username":   "gbo_app",
#       "password":   "<token-or-rotated-password>"
#     }
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gbo-db-secret
  namespace: gbo-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gbo-aws-secrets
    kind: ClusterSecretStore
  target:
    name: gbo-db-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        SPRING_DATASOURCE_URL: "jdbc:postgresql://{{ .write_host }}:{{ .port }}/{{ .dbname }}?ssl=true&sslmode=verify-full&sslrootcert=/etc/ssl/certs/rds/rds-ca-bundle.pem"
        DB_HOST:     "{{ .host }}"
        DB_USERNAME: "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"
        DB_PORT:     "{{ .port }}"
        DB_NAME:     "{{ .dbname }}"
  data:
    - secretKey: host
      remoteRef:
        key: gbo/rds/app-config
        property: host
    - secretKey: write_host
      remoteRef:
        key: gbo/rds/app-config
        property: write_host
    - secretKey: port
      remoteRef:
        key: gbo/rds/app-config
        property: port
    - secretKey: dbname
      remoteRef:
        key: gbo/rds/app-config
        property: dbname
    - secretKey: username
      remoteRef:
        key: gbo/rds/app-config
        property: username
    - secretKey: password
      remoteRef:
        key: gbo/rds/app-config
        property: password

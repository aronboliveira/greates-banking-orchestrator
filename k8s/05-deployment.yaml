apiVersion: apps/v1
kind: Deployment
metadata:
  name: pismo-api
  namespace: pismo-api
  labels:
    app: pismo-api
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: pismo-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pismo-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: pismo-api-sa
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 60

      # Pod-level security context. Satisfies Pod Security restricted profile.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: api
          # OPERATOR ACTION: replace ACCOUNT_ID and REGION. CI replaces IMAGE_TAG.
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/pismo-challenge-api:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            privileged: false

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 30

          envFrom:
            - configMapRef:
                name: pismo-api-config
            - secretRef:
                name: pismo-db-secret

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: tomcat-work
              mountPath: /tmp/tomcat
            - name: heapdump
              mountPath: /tmp/heapdump

      volumes:
        - name: tmp
          emptyDir: {}
        - name: tomcat-work
          emptyDir: {}
        - name: heapdump
          emptyDir:
            sizeLimit: 1Gi

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: pismo-api

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [pismo-api]
                topologyKey: kubernetes.io/hostname

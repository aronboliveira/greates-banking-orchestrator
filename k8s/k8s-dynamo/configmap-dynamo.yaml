# OVERRIDE ConfigMap when running with DynamoDB instead of RDS.
#
# Apply with:
#   kubectl apply -f k8s/00-namespace.yaml
#   kubectl apply -f k8s/01-serviceaccount.yaml
#   kubectl apply -f k8s/k8s-dynamo/configmap-dynamo.yaml      # use this instead of 04-configmap.yaml
#   kubectl apply -f k8s/05-deployment.yaml                    # remove envFrom secretRef pismo-db-secret
#   kubectl apply -f k8s/06-service.yaml ... etc.
#
# Skip k8s/03-external-secret.yaml entirely — DynamoDB needs no DB credentials,
# only the IRSA role for table access (already attached to pismo-api-sa).
apiVersion: v1
kind: ConfigMap
metadata:
  name: pismo-api-config
  namespace: pismo-api
data:
  # eks-dynamo profile disables JPA/Flyway, enables DynamoDB beans
  SPRING_PROFILES_ACTIVE: "eks,eks-dynamo"
  AWS_REGION: "REGION"

  # DynamoDB table — created in handoff.md §17.3
  DYNAMODB_TABLE_NAME: "pismo-api"

  # KMS field key ARN (same as RDS profile — used for document_number encryption)
  AWS_KMS_FIELD_KEY_ARN: "arn:aws:kms:REGION:ACCOUNT_ID:alias/pismo-field-encryption-key"

  # S3 audit bucket
  AUDIT_S3_BUCKET: "pismo-api-audit-logs-ACCOUNT_ID"
  AUDIT_S3_PREFIX: "transactions/"

  # SQS (still used for notifications even with DynamoDB)
  SQS_TRANSACTION_EVENTS_URL: "https://sqs.REGION.amazonaws.com/ACCOUNT_ID/pismo-transaction-events"
  SQS_ACCOUNT_EVENTS_URL:     "https://sqs.REGION.amazonaws.com/ACCOUNT_ID/pismo-account-events.fifo"

  # OAuth2 / JWT
  JWT_JWKS_URI:   "https://YOUR_IDP_DOMAIN/.well-known/jwks.json"
  JWT_ISSUER_URI: "https://YOUR_IDP_DOMAIN/"

  SERVER_TOMCAT_BASEDIR: "/tmp/tomcat"

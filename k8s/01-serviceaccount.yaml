apiVersion: v1
kind: ServiceAccount
metadata:
  name: gbo-api-sa
  namespace: gbo-api
  annotations:
    # OPERATOR ACTION: replace ACCOUNT_ID with your AWS account ID.
    # The IAM role gbo-api-pod-execution-role is created in handoff.md §6.3.
    # Its trust policy must include this exact ServiceAccount as the
    # "sts:sub" condition: system:serviceaccount:gbo-api:gbo-api-sa
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/gbo-api-pod-execution-role
    eks.amazonaws.com/token-expiration: "86400"
automountServiceAccountToken: true

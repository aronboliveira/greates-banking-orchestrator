apiVersion: v1
kind: ServiceAccount
metadata:
  name: pismo-api-sa
  namespace: pismo-api
  annotations:
    # OPERATOR ACTION: replace ACCOUNT_ID with your AWS account ID.
    # The IAM role pismo-api-pod-execution-role is created in handoff.md §6.3.
    # Its trust policy must include this exact ServiceAccount as the
    # "sts:sub" condition: system:serviceaccount:pismo-api:pismo-api-sa
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/pismo-api-pod-execution-role
    eks.amazonaws.com/token-expiration: "86400"
automountServiceAccountToken: true

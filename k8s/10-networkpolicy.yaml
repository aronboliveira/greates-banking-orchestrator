apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pismo-api-netpol
  namespace: pismo-api
spec:
  podSelector:
    matchLabels:
      app: pismo-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only the AWS Load Balancer Controller (kube-system) reaches the pods.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # PostgreSQL via RDS Proxy
    - ports:
        - protocol: TCP
          port: 5432
    # AWS service APIs (KMS, S3, SQS, X-Ray, STS) — all HTTPS
    - ports:
        - protocol: TCP
          port: 443
    # DNS (CoreDNS / kube-dns)
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53

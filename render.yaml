databases:
  - name: gbo-postgres
    plan: free
    databaseName: greatest_banking_orchestrator
    user: gbo

services:
  - type: web
    name: greatest-banking-orchestrator-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gbo-postgres
          property: connectionString
      - key: SPRING_DOCKER_COMPOSE_ENABLED
        value: "false"
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_JWT_ISSUER
        value: the-greatest-banking-orchestrator
      - key: APP_JWT_TTL_MINUTES
        value: "240"
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://greatest-banking-orchestrator-web.onrender.com
      - key: APP_NOTIFICATIONS_SMTP_ENABLED
        value: "false"
      - key: APP_NOTIFICATIONS_ALLOWED_RECIPIENT
        value: aronprogamador@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_AUTH
        value: "true"
      - key: SMTP_STARTTLS_ENABLE
        value: "true"
      - key: SMTP_STARTTLS_REQUIRED
        value: "true"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_KMS_FIELD_KEY_ARN
        sync: false
      - key: AUDIT_S3_BUCKET
        sync: false
      - key: SQS_TRANSACTION_EVENTS_URL
        sync: false
      - key: SQS_ACCOUNT_EVENTS_URL
        sync: false

  - type: web
    name: greatest-banking-orchestrator-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci --ignore-scripts && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://greatest-banking-orchestrator-api.onrender.com
